<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>排班日历 · 仅显示API节日名称</title>
    <style>
        /* ========== 基础样式 (完整保留) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f0f2f5;
            padding: 8px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 14px 10px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2d3d;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        h1 small {
            font-size: 10px;
            font-weight: 400;
            color: #5e7a99;
            background: #edf4fa;
            padding: 2px 6px;
            border-radius: 16px;
            white-space: nowrap;
        }
        .today-btn {
            background: white;
            border: 1.5px solid #ff9500;
            color: #ff9500;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            min-height: 30px;
            margin-right: 4px;
            cursor: pointer;
        }
        .settings-btn {
            background: white;
            border: 1.5px solid #b8ccdd;
            color: #2c5779;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            min-height: 30px;
            cursor: pointer;
        }
        .selector-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9fcff;
            padding: 10px;
            border-radius: 18px;
            margin-bottom: 14px;
            border: 1px solid #d4e2f0;
        }
        .select-group {
            width: 100%;
        }
        .select-group label {
            font-size: 11px;
            color: #2c3e50;
            margin-bottom: 3px;
            display: block;
        }
        .select-group select,
        .select-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid #d9e2ec;
            border-radius: 20px;
            font-size: 13px;
            min-height: 40px;
        }
        .calendar-wrapper {
            width: 100%;
            overflow: hidden;
            touch-action: pan-y;
        }
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .calendar-table th {
            padding: 6px 2px;
            font-size: 11px;
            color: #1e3b5c;
            border-bottom: 2px solid #cbd6e4;
            font-weight: 600;
        }
        .calendar-table td {
            border: 1px solid #ecf3fa;
            text-align: center;
            padding: 6px 1px;
            font-size: 11px;
            width: 14.28%;
            cursor: pointer;
            transition: background 0.1s;
        }
        .calendar-table td:hover {
            background: #f0f8ff;
        }
        .date-num {
            font-weight: 600;
            font-size: 20px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
        }
        .schedule-badge {
            display: inline-block;
            padding: 2px 3px;
            border-radius: 12px;
            font-size: 12px;
            min-width: 36px;
        }
        .badge-work { background: #e2f0ff; color: #0057b3; }
        .badge-day  { background: #e6f7e6; color: #1e7a1e; }
        .badge-night { background: #e3eafc; color: #283593; }
        .badge-rest { background: #f2f2f2; color: #6c757d; }
        .today-highlight {
            background: #fff7e6;
            border-radius: 4px;
        }
        .today-highlight .date-num {
            color: #d45a00;
        }
        .calendar-table td.selected {
            background-color: #b8d9ff;
        }
        .today-tag {
            font-size: 10px;
            background: #ff9500;
            color: white;
            padding: 0 3px;
            border-radius: 6px;
            line-height: 1.2;
        }
        /* 节日标签 (红色) */
        .holiday-tag {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            font-size: 9px;
            padding: 1px 3px;
            border-radius: 4px;
            margin-left: 2px;
            line-height: 1.2;
            white-space: nowrap;
            max-width: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .holiday-status {
            font-size: 10px;
            margin-top: 6px;
            padding: 4px;
            border-radius: 12px;
            background: #f0f7ff;
            color: #2c5779;
            text-align: center;
        }
        .holiday-status.success {
            background: #e6f7e6;
            color: #1e7a1e;
        }
        .holiday-status.error {
            background: #ffe6e6;
            color: #b30000;
        }
        .other-values {
            margin-top: 12px;
            padding: 10px 8px;
            background: #f9fcff;
            border-radius: 18px;
            border: 1px solid #d4e2f0;
        }
        .other-title {
            font-size: 11px;
            color: #2c5779;
            margin-bottom: 8px;
            font-weight: 500;
            text-align: left;
            padding-left: 4px;
        }
        .other-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: space-around;
        }
        .other-item {
            flex: 1 0 auto;
            min-width: 55px;
            background: white;
            border-radius: 16px;
            padding: 6px 2px;
            text-align: center;
            border: 1px solid #d4e2f0;
        }
        .other-value-name {
            font-size: 11px;
            font-weight: 600;
            color: #1e3b5c;
        }
        .other-schedule {
            font-size: 12px;
            padding: 4px 4px;
            border-radius: 12px;
            margin-top: 2px;
            white-space: nowrap;
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 10px;
        }
        .modal-card {
            background: white;
            width: 100%;
            border-radius: 24px;
            padding: 18px 14px;
        }
        .base-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3f9ff;
            padding: 7px 10px;
            border-radius: 24px;
            margin-bottom: 8px;
        }
        .base-row label {
            min-width: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #1f4970;
        }
        .base-row input,
        .base-row select {
            flex: 1;
            padding: 6px;
            border-radius: 20px;
            border: 1px solid #c2d6e8;
            background: white;
            font-size: 13px;
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .save-btn, .cancel-btn {
            flex: 1;
            padding: 8px;
            border-radius: 22px;
            font-weight: 600;
        }
        .save-btn {
            background: #0077ff;
            color: white;
            border: none;
        }
        .cancel-btn {
            background: transparent;
            border: 1.5px solid #a1b9cf;
        }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 8px;">
    <span style="font-size: 12px; color: #666;"> 宇宙万空 制作 </span>
</div>

<div class="card">
    <div class="header">
        <h1>🗓️ 排班日历 </h1>
        <div>
            <button class="today-btn" onclick="goToToday()">今天</button>
            <button class="settings-btn" onclick="openSettingsModal()">设置</button>
        </div>
    </div>

    <div class="selector-panel">
        <div class="select-group">
            <label>👥 运行值</label>
            <select id="scheduleValue">
                <option value="1">一值</option>
                <option value="2">二值</option>
                <option value="3">三值</option>
                <option value="4">四值</option>
                <option value="5">五值</option>
            </select>
        </div>
        <div class="select-group">
            <label>📆 选择月份</label>
            <input type="month" id="monthPicker" value="2026-03">
        </div>
    </div>

    <div class="calendar-wrapper">
        <table class="calendar-table" id="calendarTable">
            <thead>
            <tr>
                <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th>
            </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>

    <!-- 节假日加载状态提示 -->
    <div id="holidayStatus" class="holiday-status">⏳ 正在加载节假日...</div>

    <!-- 所选日期排班 (五值对比) -->
    <div class="other-values">
        <div class="other-title" id="selectedDateTitle">📅 所选日期排班</div>
        <div class="other-grid" id="otherValuesGrid"></div>
    </div>
</div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this) closeSettingsModal()">
    <div class="modal-card" onclick="event.stopPropagation()">
        <h3>📌 设置第一个零点 (一值)</h3>
        <div style="background:#e8f0fe;padding:8px;margin:10px 0;border-radius:12px;font-size:12px;">
            🌙 修改一值日期，其余自动 ±2天
        </div>
        <div id="baseInputsGrid"></div>

        <div class="base-row">
            <label>默认值</label>
            <select id="defaultValueSelect">
                <option value="1">一值</option>
                <option value="2">二值</option>
                <option value="3">三值</option>
                <option value="4">四值</option>
                <option value="5">五值</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="cancel-btn" onclick="closeSettingsModal()">取消</button>
            <button class="save-btn" onclick="saveAllBaseDates()">保存</button>
        </div>
    </div>
</div>


<script>
    (function() {
        // ---------- 固定排班参数 ----------
        const OFFSET_FIXED = 6;
        const PRESET_BASE4_ZERO = '2026-03-14';

        // ---------- 全局变量 ----------
        let selectedDateStr = '';
        let baseDateConfig = {};
        // 存储节假日数据，格式: { "2026-01-01": { name: "元旦", isHoliday: true }, ... }
        let holidayMap = {};
        let isLoading = false;

        const statusEl = document.getElementById('holidayStatus');

        // ========== 1. 初始化排班基准日期 (与原逻辑相同) ==========
        function calculateBase1FromBase4(base4Str) {
            const base4 = new Date(base4Str);
            base4.setDate(base4.getDate() - 6);
            return `${base4.getFullYear()}-${String(base4.getMonth()+1).padStart(2,'0')}-${String(base4.getDate()).padStart(2,'0')}`;
        }
        const DEFAULT_BASE1_ZERO = calculateBase1FromBase4(PRESET_BASE4_ZERO);

        function loadFullConfigFromStorage() {
            try {
                const stored = localStorage.getItem('scheduleFullConfig_zero_preset4');
                if (stored) return JSON.parse(stored);
            } catch (e) {}
            return generateFullConfigFromBase1Zero(DEFAULT_BASE1_ZERO);
        }

        function generateFullConfigFromBase1Zero(base1ZeroStr) {
            const base1 = new Date(base1ZeroStr);
            const config = {};
            for (let v = 1; v <= 5; v++) {
                const d = new Date(base1);
                d.setDate(base1.getDate() + (v - 1) * 2);
                config[v] = {
                    date: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`,
                    cycleOffset: OFFSET_FIXED
                };
            }
            return config;
        }

        baseDateConfig = loadFullConfigFromStorage();

        function saveFullConfigToStorage(config) {
            localStorage.setItem('scheduleFullConfig_zero_preset4', JSON.stringify(config));
        }

        // ========== 2. 获取排班信息 ==========
        function getScheduleByDate(targetDate, value) {
            const config = baseDateConfig[value];
            const baseZeroDate = new Date(config.date);
            const t = new Date(targetDate);
            const dayDiff = Math.floor((t - baseZeroDate) / 86400000);
            const cyclePos = ((6 + dayDiff) % 10 + 10) % 10 + 1;

            let schedule = '休息';
            switch(cyclePos) {
                case 1: case 2: schedule = '中班'; break;
                case 4: case 5: schedule = '白班'; break;
                case 7: case 8: schedule = '零点'; break;
            }
            return { schedule, cyclePos };
        }

        // ========== 3. 工具函数 ==========
        function getTodayDateStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ========== 4. 从API获取节假日数据 (完全依赖API，无内置) ==========
        async function fetchHolidaysForYear(year) {
            if (isLoading) return;
            isLoading = true;
            updateStatus('info', `⏳ 正在获取 ${year} 年节假日数据...`);

            try {
                const url = `https://timor.tech/api/holiday/year/${year}/`;
                const response = await fetch(url);
                const result = await response.json();

                console.log('API返回原始数据:', result);

                if (result.code === 0 && result.holiday) {
                    const yearData = {};
                    for (const [mmdd, info] of Object.entries(result.holiday)) {
                        if (info.date) {
                            yearData[info.date] = {
                                name: info.name,
                                isHoliday: info.holiday === true
                            };
                        }
                    }
                    holidayMap = yearData;
                    updateStatus('success', `✅ 已加载 ${year} 年节假日数据`);
                    console.log('解析后的节假日数据:', holidayMap);
                } else {
                    throw new Error('API返回数据格式异常');
                }
            } catch (error) {
                console.error('获取节假日失败:', error);
                holidayMap = {}; // 清空数据，不显示任何节日标签
                updateStatus('error', '❌ 节假日加载失败，无内置数据');
            } finally {
                isLoading = false;
                renderMonthCalendar(); // 重新渲染
            }
        }

        function updateStatus(type, msg) {
            if (statusEl) {
                statusEl.innerText = msg;
                statusEl.className = 'holiday-status ' + type;
            }
        }

        function loadHolidaysForCurrentMonth() {
            const [year] = document.getElementById('monthPicker').value.split('-').map(Number);
            fetchHolidaysForYear(year);
        }

        // ========== 5. 更新底部五值排班 (与原逻辑相同) ==========
        function updateOtherValues(dateStr) {
            const grid = document.getElementById('otherValuesGrid');
            const currentValue = document.getElementById('scheduleValue').value;
            const titleEl = document.getElementById('selectedDateTitle');
            if (dateStr) {
                const [y, m, d] = dateStr.split('-');
                titleEl.innerText = `📅 ${y}年${parseInt(m)}月${parseInt(d)}日 排班`;
            }

            let html = '';
            for (let v = 1; v <= 5; v++) {
                const { schedule, cyclePos } = getScheduleByDate(dateStr, v);
                let cls = 'badge-rest';
                let displayText = '';
                if (schedule === '中班') {
                    cls = 'badge-work';
                    displayText = `中班 ${cyclePos === 1 ? '①' : '②'}`;
                } else if (schedule === '白班') {
                    cls = 'badge-day';
                    displayText = `白班 ${cyclePos === 4 ? '①' : '②'}`;
                } else if (schedule === '零点') {
                    cls = 'badge-night';
                    displayText = `零点 ${cyclePos === 7 ? '①' : '②'}`;
                } else {
                    if (cyclePos === 3) displayText = '中休';
                    else if (cyclePos === 6) displayText = '白休';
                    else if (cyclePos === 9) displayText = '大休①';
                    else if (cyclePos === 10) displayText = '大休②';
                    else displayText = '休';
                }
                const isCurrent = v == currentValue;
                html += `
                    <div class="other-item" ${isCurrent ? 'style="border:2px solid #ff9500;"' : ''}>
                        <div class="other-value-name">${v}值</div>
                        <div class="other-schedule ${cls}">${displayText}</div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // ========== 6. 渲染日历 (仅当API返回且isHoliday为true时显示红色标签) ==========
        function renderMonthCalendar() {
            const selectedValue = document.getElementById('scheduleValue').value;
            const monthPicker = document.getElementById('monthPicker');
            let [year, month] = monthPicker.value.split('-').map(Number);

            const todayStr = getTodayDateStr();

            // 处理选中日期
            if (!selectedDateStr || !selectedDateStr.startsWith(`${year}-${String(month).padStart(2,'0')}`)) {
                if (selectedDateStr) {
                    const [oy, om, od] = selectedDateStr.split('-').map(Number);
                    const lastDay = new Date(year, month, 0).getDate();
                    const targetDay = Math.min(od, lastDay);
                    selectedDateStr = `${year}-${String(month).padStart(2,'0')}-${String(targetDay).padStart(2,'0')}`;
                } else {
                    if (todayStr.startsWith(`${year}-${month}`)) {
                        selectedDateStr = todayStr;
                    } else {
                        selectedDateStr = `${year}-${String(month).padStart(2,'0')}-01`;
                    }
                }
            }

            // 构建日历格子
            const firstDay = new Date(year, month - 1, 1);
            const lastDay = new Date(year, month, 0);
            const daysInMonth = lastDay.getDate();

            let firstWeekday = firstDay.getDay() || 7;
            let startCol = firstWeekday - 1;

            const rows = [];
            let currentDay = 1;

            for (let r = 0; r < 6; r++) {
                const row = [];
                for (let c = 0; c < 7; c++) {
                    if (r === 0 && c < startCol) {
                        row.push({ day: 0 });
                    } else if (currentDay <= daysInMonth) {
                        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(currentDay).padStart(2,'0')}`;
                        row.push({ day: currentDay, dateStr });
                        currentDay++;
                    } else {
                        row.push({ day: 0 });
                    }
                }
                rows.push(row);
                if (currentDay > daysInMonth) break;
            }

            const tbody = document.getElementById('calendarBody');
            let html = '';

            rows.forEach(row => {
                html += '<tr>';
                row.forEach(cell => {
                    if (cell.day === 0) {
                        html += '<td style="background:#fafcfe;"></td>';
                    } else {
                        const { schedule } = getScheduleByDate(cell.dateStr, selectedValue);
                        let cls = 'badge-rest';
                        if (schedule === '中班') cls = 'badge-work';
                        else if (schedule === '白班') cls = 'badge-day';
                        else if (schedule === '零点') cls = 'badge-night';

                        const isToday = cell.dateStr === todayStr;
                        const isSelected = cell.dateStr === selectedDateStr;
                        const todayCls = isToday ? 'today-highlight' : '';
                        const selectedCls = isSelected ? 'selected' : '';

                        // 生成额外标签：仅当API返回且为真节日时显示红色名称
                        let extraTags = '';
                        const holidayInfo = holidayMap[cell.dateStr];
                        if (holidayInfo && holidayInfo.isHoliday) {
                            const shortName = holidayInfo.name.length > 2 ? holidayInfo.name.substr(0,2) : holidayInfo.name;
                            extraTags = `<span class="holiday-tag" title="${holidayInfo.name}">${shortName}</span>`;
                        }

                        html += `<td class="${todayCls} ${selectedCls}" onclick="selectDate('${cell.dateStr}')">`;
                        html += `<div class="date-num">${cell.day}${isToday ? '<span class="today-tag">今</span>' : ''} ${extraTags}</div>`;
                        html += `<div class="schedule-badge ${cls}">${schedule}</div>`;
                        html += '</td>';
                    }
                });
                html += '</tr>';
            });
            tbody.innerHTML = html;

            updateOtherValues(selectedDateStr);
        }

        // ========== 7. 全局函数 ==========
        window.selectDate = function(dateStr) {
            selectedDateStr = dateStr;
            renderMonthCalendar();
        };

        window.goToToday = function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            selectedDateStr = `${year}-${month}-${day}`;
            document.getElementById('monthPicker').value = `${year}-${month}`;
            renderMonthCalendar();
            loadHolidaysForCurrentMonth(); // 切换月份重新加载
        };

        window.openSettingsModal = function() {
            const grid = document.getElementById('baseInputsGrid');
            let html = '';
            for (let v = 1; v <= 5; v++) {
                const val = baseDateConfig[v].date;
                html += `
                    <div class="base-row">
                        <label>${v}值</label>
                        <input type="date" id="baseDate${v}" value="${val}" data-value="${v}">
                    </div>`;
            }
            grid.innerHTML = html;
            document.getElementById('defaultValueSelect').value = localStorage.getItem('defaultScheduleValue') || '1';
            document.getElementById('settingsModal').style.display = 'flex';
        };

        window.closeSettingsModal = function() {
            document.getElementById('settingsModal').style.display = 'none';
        };

        window.saveAllBaseDates = function() {
            const v1 = document.getElementById('baseDate1').value;
            baseDateConfig = generateFullConfigFromBase1Zero(v1);
            saveFullConfigToStorage(baseDateConfig);
            localStorage.setItem('defaultScheduleValue', document.getElementById('defaultValueSelect').value);
            document.getElementById('scheduleValue').value = localStorage.getItem('defaultScheduleValue');
            closeSettingsModal();
            renderMonthCalendar();
        };

        // ========== 8. 初始化 ==========
        window.onload = function() {
            const savedDefault = localStorage.getItem('defaultScheduleValue');
            if (savedDefault) {
                document.getElementById('scheduleValue').value = savedDefault;
            }
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            selectedDateStr = `${year}-${month}-${day}`;
            document.getElementById('monthPicker').value = `${year}-${month}`;

            renderMonthCalendar();
            loadHolidaysForCurrentMonth();

            document.getElementById('scheduleValue').addEventListener('change', renderMonthCalendar);
            document.getElementById('monthPicker').addEventListener('change', function() {
                renderMonthCalendar();
                loadHolidaysForCurrentMonth();
            });
        };

        // ========== 9. 滑动切换月份 (手势，与原逻辑相同) ==========
        const wrapper = document.querySelector('.calendar-wrapper');
        if (wrapper) {
            let touchStartX = 0, touchStartY = 0, swiping = false;
            const SWIPE_THRESHOLD = 30, MOVE_THRESHOLD = 10;
            wrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; swiping = false; }, { passive: true });
            wrapper.addEventListener('touchmove', e => {
                if (touchStartX === undefined) return;
                const deltaX = e.touches[0].clientX - touchStartX, deltaY = e.touches[0].clientY - touchStartY;
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > MOVE_THRESHOLD) { e.preventDefault(); swiping = true; }
            }, { passive: false });
            wrapper.addEventListener('touchend', e => {
                if (touchStartX === undefined) return;
                const deltaX = e.changedTouches[0].clientX - touchStartX, deltaY = e.changedTouches[0].clientY - touchStartY;
                if (swiping && Math.abs(deltaX) > SWIPE_THRESHOLD && Math.abs(deltaX) > Math.abs(deltaY)) {
                    const monthPicker = document.getElementById('monthPicker');
                    let [year, month] = monthPicker.value.split('-').map(Number);
                    if (deltaX < 0) { month++; if (month>12) { month=1; year++; } }
                    else { month--; if (month<1) { month=12; year--; } }
                    monthPicker.value = `${year}-${String(month).padStart(2,'0')}`;
                    renderMonthCalendar();
                    loadHolidaysForCurrentMonth();
                }
                touchStartX = undefined; swiping = false;
            }, { passive: true });
            wrapper.addEventListener('touchcancel', () => { touchStartX = undefined; swiping = false; }, { passive: true });
        }
    })();
</script>
</body>
</html>
