<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>排班日历 · 灵活设置基准</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif}body{background:#f0f2f5;padding:50px 8px 0 8px;min-height:100vh;display:flex;flex-direction:column;align-items:center}.card{width:100%;max-width:450px;background:#fff;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,.1);padding:14px 10px 4px 10px;margin-bottom:0}.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px}h1{font-size:18px;font-weight:600;color:#1f2d3d;display:flex;align-items:center;gap:4px}h1 small{font-size:10px;font-weight:400;color:#5e7a99;background:#edf4fa;padding:2px 6px;border-radius:16px;white-space:nowrap}.today-btn{background:#fff;border:1.5px solid #ff9500;color:#ff9500;font-weight:500;padding:5px 10px;border-radius:20px;font-size:12px;min-height:30px;margin-right:4px;cursor:pointer}.settings-btn{background:#fff;border:1.5px solid #b8ccdd;color:#2c5779;font-weight:500;padding:5px 10px;border-radius:20px;font-size:12px;min-height:30px;cursor:pointer}.selector-panel{display:flex;flex-direction:row;gap:8px;background:#f9fcff;padding:8px 8px;border-radius:18px;margin-bottom:14px;border:1px solid #d4e2f0;align-items:flex-end}.select-group{flex:1;min-width:0}.select-group label{font-size:10px;color:#2c3e50;margin-bottom:2px;display:block}.select-group select,.select-group input{width:100%;padding:5px 8px;border:1.5px solid #d9e2ec;border-radius:20px;font-size:12px;min-height:34px;background:#fff}.calendar-wrapper{width:100%;overflow:hidden;touch-action:pan-y}.calendar-table{width:100%;border-collapse:collapse;table-layout:fixed}.calendar-table th{padding:6px 2px;font-size:11px;color:#1e3b5c;border-bottom:2px solid #cbd6e4;font-weight:600}.calendar-table td{border:1px solid #ecf3fa;text-align:center;padding:10px 1px;font-size:11px;width:14.28%;cursor:pointer;transition:background .1s}.calendar-table td:hover{background:#f0f8ff}.date-num{font-weight:600;font-size:20px;margin-bottom:2px;display:flex;align-items:center;justify-content:center;gap:2px;flex-wrap:wrap}.schedule-badge{display:inline-block;padding:2px 3px;border-radius:12px;font-size:12px;min-width:36px}.badge-work{background:#e2f0ff;color:#0057b3}.badge-day{background:#e6f7e6;color:#1e7a1e}.badge-night{background:#e3eafc;color:#283593}.badge-rest{background:#f2f2f2;color:#6c757d}.today-highlight{background:#fff7e6;border-radius:4px}.today-highlight .date-num{color:#d45a00}.calendar-table td.selected{background-color:#b8d9ff}.today-tag{font-size:10px;background:#ff9500;color:#fff;padding:0 3px;border-radius:6px;line-height:1.2}.holiday-tag{display:inline-block;background:#ff6b6b;color:#fff;font-size:9px;padding:1px 3px;border-radius:4px;margin-left:2px;line-height:1.2;white-space:nowrap}.workday-tag{display:inline-block;background:#4a90d9;color:#fff;font-size:9px;padding:1px 3px;border-radius:4px;margin-left:2px;line-height:1.2;white-space:nowrap}.triple-pay-tag{display:inline-block;color:#ff6b00;font-size:9px;font-weight:700;margin-left:1px;line-height:1.2;white-space:nowrap}.holiday-status{font-size:10px;margin-top:10px;padding:6px;border-radius:12px;background:#f0f7ff;color:#2c5779;text-align:center;display:none}.holiday-status.success{background:#e6f7e6;color:#1e7a1e}.other-values{margin-top:12px;padding:10px 8px;background:#f9fcff;border-radius:18px;border:1px solid #d4e2f0}.other-title{font-size:11px;color:#2c5779;margin-bottom:8px;font-weight:500;text-align:left;padding-left:4px}.other-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:space-around}.other-item{flex:1 0 auto;min-width:50px;background:#fff;border-radius:16px;padding:6px 2px;text-align:center;border:1px solid #d4e2f0}.other-value-name{font-size:12px;font-weight:600;color:#1e3b5c}.other-schedule{font-size:13px;padding:4px 3px;border-radius:12px;margin-top:2px;white-space:nowrap}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:1000;padding:10px}.modal-card{background:#fff;width:100%;max-width:420px;border-radius:24px;padding:18px 14px;max-height:85vh;overflow-y:auto}.modal-card h3{font-size:16px;color:#1f2d3d;margin-bottom:4px}.modal-card .setting-hint{background:#e8f0fe;padding:8px 10px;margin:8px 0;border-radius:12px;font-size:12px;color:#2c5779;line-height:1.5}.setting-row{display:flex;align-items:center;gap:6px;background:#f3f9ff;padding:7px 10px;border-radius:24px;margin-bottom:8px}.setting-row label{min-width:28px;font-size:13px;font-weight:600;color:#1f4970;white-space:nowrap}.setting-row select,.setting-row input{flex:1;padding:6px 8px;border-radius:20px;border:1px solid #c2d6e8;background:#fff;font-size:13px;min-width:0}.preview-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}.preview-table th{background:#e8f0fe;padding:6px 4px;border:1px solid #cbd6e4;font-weight:600;color:#1e3b5c;font-size:11px}.preview-table td{padding:6px 4px;border:1px solid #d4e2f0;text-align:center;font-size:12px;color:#1f2d3d}.preview-table .val-name{font-weight:600;color:#1f4970}.modal-actions{display:flex;gap:8px;margin-top:12px}.save-btn,.cancel-btn{flex:1;padding:8px;border-radius:22px;font-weight:600;font-size:14px;cursor:pointer}.save-btn{background:#0077ff;color:#fff;border:none}.cancel-btn{background:transparent;border:1.5px solid #a1b9cf;color:#2c5779}.default-row{display:flex;align-items:center;gap:6px;background:#fefaf0;padding:7px 10px;border-radius:24px;margin-bottom:8px;border:1px solid #f0d88a}.default-row label{min-width:40px;font-size:13px;font-weight:600;color:#7a5d00;white-space:nowrap}.default-row select{flex:1;padding:6px 8px;border-radius:20px;border:1px solid #d9c56e;background:#fff;font-size:13px}</style></head><body><div class="card"><div class="header"><h1>🗓️ 排班日历</h1><div><button class="today-btn" onclick="goToToday()">今天</button><button class="settings-btn" onclick="openSettingsModal()">设置</button></div></div><div class="selector-panel"><div class="select-group"><label>👥 运行值</label><select id="scheduleValue"><option value="1">一值</option><option value="2">二值</option><option value="3">三值</option><option value="4">四值</option><option value="5">五值</option></select></div><div class="select-group"><label>📆 选择月份</label><input type="month" id="monthPicker" value="2026-04"></div></div><div class="calendar-wrapper"><table class="calendar-table" id="calendarTable"><thead><tr><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th></tr></thead><tbody id="calendarBody"></tbody></table></div><div id="holidayStatus" class="holiday-status">📅 加载中...</div><div class="other-values"><div class="other-title" id="selectedDateTitle">📅 所选日期排班</div><div class="other-grid" id="otherValuesGrid"></div></div></div><div class="modal-overlay" id="settingsModal" onclick="if(event.target===this) closeSettingsModal()"><div class="modal-card" onclick="event.stopPropagation()"><h3>📌 排班基准设置</h3><div class="setting-hint">💡 选择<strong>任意一个值</strong>、<strong>任意一个班次</strong>及其<strong>日期</strong>，系统自动推算所有五个值的完整排班。每个值之间间隔<strong>2天</strong>。</div><div class="setting-row"><label>👥 值</label><select id="settingValueSelect" onchange="onSettingValueChange()"><option value="1">一值</option><option value="2">二值</option><option value="3">三值</option><option value="4">四值</option><option value="5">五值</option></select></div><div class="setting-row"><label>🔄 班次</label><select id="settingShiftSelect" onchange="onSettingShiftChange()"><option value="1">中班①</option><option value="2">中班②</option><option value="3">中休</option><option value="4">白班①</option><option value="5">白班②</option><option value="6">白休</option><option value="7">零点①</option><option value="8">零点②</option><option value="9">大休①</option><option value="10">大休②</option></select></div><div class="setting-row"><label>📅 日期</label><input type="date" id="settingDateInput" onchange="onSettingDateChange()"></div><div class="setting-hint" style="background:#f0f7e6;color:#1e7a1e;">📋 <strong>预览推算结果</strong>（各值「中班①」日期）</div><table class="preview-table" id="settingPreviewTable"><thead><tr><th>一值</th><th>二值</th><th>三值</th><th>四值</th><th>五值</th></tr></thead><tbody><tr id="settingPreviewRow"><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr></tbody></table><div class="default-row"><label>⭐ 默认显示值</label><select id="defaultValueSelect"><option value="1">一值</option><option value="2">二值</option><option value="3">三值</option><option value="4">四值</option><option value="5">五值</option></select></div><div class="modal-actions"><button class="cancel-btn" onclick="closeSettingsModal()">取消</button><button class="save-btn" onclick="saveAllBaseDates()">💾 保存</button></div></div></div><script>
    (function(){const CONFIG={CYCLE_OFFSET:6,PRESET_BASE4_ZERO:'2026-03-14',STORAGE_KEY:'scheduleFullConfig_zero_preset4',DEFAULT_VALUE_KEY:'defaultScheduleValue'};const HOLIDAYS_BY_YEAR={2026:{holidays:{'2026-01-01':{name:'元旦',isHoliday:true,triplePay:true},'2026-01-02':{name:'元旦',isHoliday:true,triplePay:false},'2026-01-03':{name:'元旦',isHoliday:true,triplePay:false},'2026-02-15':{name:'春节',isHoliday:true,triplePay:false},'2026-02-16':{name:'除夕',isHoliday:true,triplePay:true},'2026-02-17':{name:'春节',isHoliday:true,triplePay:true},'2026-02-18':{name:'春节',isHoliday:true,triplePay:true},'2026-02-19':{name:'春节',isHoliday:true,triplePay:true},'2026-02-20':{name:'春节',isHoliday:true,triplePay:false},'2026-02-21':{name:'春节',isHoliday:true,triplePay:false},'2026-02-22':{name:'春节',isHoliday:true,triplePay:false},'2026-02-23':{name:'春节',isHoliday:true,triplePay:false},'2026-04-04':{name:'清明节',isHoliday:true,triplePay:false},'2026-04-05':{name:'清明节',isHoliday:true,triplePay:true},'2026-04-06':{name:'清明节',isHoliday:true,triplePay:false},'2026-05-01':{name:'劳动节',isHoliday:true,triplePay:true},'2026-05-02':{name:'劳动节',isHoliday:true,triplePay:true},'2026-05-03':{name:'劳动节',isHoliday:true,triplePay:false},'2026-05-04':{name:'劳动节',isHoliday:true,triplePay:false},'2026-05-05':{name:'劳动节',isHoliday:true,triplePay:false},'2026-06-19':{name:'端午节',isHoliday:true,triplePay:true},'2026-06-20':{name:'端午节',isHoliday:true,triplePay:false},'2026-06-21':{name:'端午节',isHoliday:true,triplePay:false},'2026-09-25':{name:'中秋节',isHoliday:true,triplePay:true},'2026-09-26':{name:'中秋节',isHoliday:true,triplePay:false},'2026-09-27':{name:'中秋节',isHoliday:true,triplePay:false},'2026-10-01':{name:'国庆节',isHoliday:true,triplePay:true},'2026-10-02':{name:'国庆节',isHoliday:true,triplePay:true},'2026-10-03':{name:'国庆节',isHoliday:true,triplePay:true},'2026-10-04':{name:'国庆节',isHoliday:true,triplePay:false},'2026-10-05':{name:'国庆节',isHoliday:true,triplePay:false},'2026-10-06':{name:'国庆节',isHoliday:true,triplePay:false},'2026-10-07':{name:'国庆节',isHoliday:true,triplePay:false}},workdays:{'2026-01-04':'元旦调休','2026-02-14':'春节调休','2026-02-28':'春节调休','2026-05-09':'劳动节调休','2026-09-20':'国庆节调休','2026-10-10':'国庆节调休'}}};function getCurrentYearHolidays(){const year=new Date().getFullYear();return HOLIDAYS_BY_YEAR[year]||HOLIDAYS_BY_YEAR[2026];}function buildHolidayMap(yearData){const map={};for(const[date,info]of Object.entries(yearData.holidays)){map[date]=info;}for(const[date,name]of Object.entries(yearData.workdays)){map[date]={name,isHoliday:false,isWorkday:true};}return map;}let holidayMap={};let baseDateConfig={};let selectedDateStr='';const yearData=getCurrentYearHolidays();holidayMap=buildHolidayMap(yearData);function calculateBase1FromBase4(dateStr){const d=new Date(dateStr);d.setDate(d.getDate()-6);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}const DEFAULT_BASE1_ZERO=calculateBase1FromBase4(CONFIG.PRESET_BASE4_ZERO);function generateFullConfigFromBase1Zero(base1ZeroDate){const d=new Date(base1ZeroDate);const config={};for(let val=1;val<=5;val++){const temp=new Date(d);temp.setDate(d.getDate()+(val-1)*2);config[val]={date:`${temp.getFullYear()}-${String(temp.getMonth()+1).padStart(2,'0')}-${String(temp.getDate()).padStart(2,'0')}`,cycleOffset:CONFIG.CYCLE_OFFSET};}return config;}function loadFullConfigFromStorage(){try{const saved=localStorage.getItem(CONFIG.STORAGE_KEY);if(saved)return JSON.parse(saved);}catch(e){}return generateFullConfigFromBase1Zero(DEFAULT_BASE1_ZERO);}function saveFullConfigToStorage(config){localStorage.setItem(CONFIG.STORAGE_KEY,JSON.stringify(config));}baseDateConfig=loadFullConfigFromStorage();function getScheduleByDate(dateStr,valueIndex){const baseDate=new Date(baseDateConfig[valueIndex].date);const targetDate=new Date(dateStr);const diffDays=Math.floor((targetDate-baseDate)/86400000);const cyclePos=((CONFIG.CYCLE_OFFSET+diffDays)%10+10)%10+1;let scheduleName='休息';if(cyclePos===1||cyclePos===2)scheduleName='中班';else if(cyclePos===4||cyclePos===5)scheduleName='白班';else if(cyclePos===7||cyclePos===8)scheduleName='零点';return{schedule:scheduleName,cyclePos};}function getTodayDateStr(){const now=new Date();return`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;}const statusEl=document.getElementById('holidayStatus');function updateHolidayStatus(){if(!statusEl)return;statusEl.innerText='';statusEl.className='';}function updateOtherValues(dateStr){const grid=document.getElementById('otherValuesGrid');const currentValue=document.getElementById('scheduleValue').value;const titleEl=document.getElementById('selectedDateTitle');if(dateStr){const[y,m,d]=dateStr.split('-');titleEl.innerText=`📅 ${y}年${parseInt(m)}月${parseInt(d)}日 排班`;}const holidayInfo=holidayMap[dateStr];let extraText='';if(holidayInfo&&holidayInfo.isHoliday){extraText=` 🏖️${holidayInfo.name}`;if(holidayInfo.triplePay)extraText+=' | 💰3倍工资日';}else if(holidayInfo&&holidayInfo.isWorkday){extraText=' 🔧调休上班日';}if(extraText)titleEl.innerText+=extraText;let html='';for(let val=1;val<=5;val++){const{schedule,cyclePos}=getScheduleByDate(dateStr,val);let badgeClass='badge-rest',label='';if(schedule==='中班'){badgeClass='badge-work';label=`中班 ${cyclePos===1?'①':'②'}`;}else if(schedule==='白班'){badgeClass='badge-day';label=`白班 ${cyclePos===4?'①':'②'}`;}else if(schedule==='零点'){badgeClass='badge-night';label=`零点 ${cyclePos===7?'①':'②'}`;}else if(cyclePos===3)label='中休';else if(cyclePos===6)label='白休';else if(cyclePos===9)label='大休①';else if(cyclePos===10)label='大休②';else label='休';const isActive=val==currentValue;html+=`
                        <div class="other-item"${isActive?' style="border:2px solid #ff9500;"':''}>
                            <div class="other-value-name">${val}值</div>
                            <div class="other-schedule ${badgeClass}">${label}</div>
                        </div>`;}grid.innerHTML=html;}function renderMonthCalendar(){const currentValue=document.getElementById('scheduleValue').value;const monthPicker=document.getElementById('monthPicker');let[year,month]=monthPicker.value.split('-').map(Number);const todayStr=getTodayDateStr();if(!selectedDateStr||!selectedDateStr.startsWith(`${year}-${String(month).padStart(2,'0')}`)){if(selectedDateStr){const[,,selDay]=selectedDateStr.split('-').map(Number);const maxDay=new Date(year,month,0).getDate();selectedDateStr=`${year}-${String(month).padStart(2,'0')}-${String(Math.min(selDay,maxDay)).padStart(2,'0')}`;}else{selectedDateStr=todayStr.startsWith(`${year}-${month}`)?todayStr:`${year}-${String(month).padStart(2,'0')}-01`;}}const firstDay=new Date(year,month-1,1);const lastDay=new Date(year,month,0);const daysInMonth=lastDay.getDate();let startDayOfWeek=firstDay.getDay()||7;let leadingBlanks=startDayOfWeek-1;const rows=[];let dayCounter=1;for(let r=0;r<6;r++){const row=[];for(let c=0;c<7;c++){if(r===0&&c<leadingBlanks)row.push({day:0});else if(dayCounter<=daysInMonth){row.push({day:dayCounter,dateStr:`${year}-${String(month).padStart(2,'0')}-${String(dayCounter).padStart(2,'0')}`});dayCounter++;}else row.push({day:0});}rows.push(row);if(dayCounter>daysInMonth)break;}const tbody=document.getElementById('calendarBody');let tableHtml='';rows.forEach(row=>{tableHtml+='<tr>';row.forEach(cell=>{if(cell.day===0){tableHtml+='<td style="background:#fafcfe;"></td>';}else{const{schedule}=getScheduleByDate(cell.dateStr,currentValue);let badgeClass='badge-rest';if(schedule==='中班')badgeClass='badge-work';else if(schedule==='白班')badgeClass='badge-day';else if(schedule==='零点')badgeClass='badge-night';const isToday=cell.dateStr===todayStr;const isSelected=cell.dateStr===selectedDateStr;const todayClass=isToday?'today-highlight':'';const selectedClass=isSelected?'selected':'';let tags='';const holidayInfo=holidayMap[cell.dateStr];if(holidayInfo&&holidayInfo.isHoliday){if(holidayInfo.triplePay){tags+=`<span class="holiday-tag" title="${holidayInfo.name}">${holidayInfo.name.length>2?holidayInfo.name.substring(0,2):holidayInfo.name}</span>`;}else{tags+=`<span class="holiday-tag" title="${holidayInfo.name}">休</span>`;}}if(holidayInfo&&holidayInfo.isWorkday){tags+=`<span class="workday-tag" title="${holidayInfo.name}">班</span>`;}if(holidayInfo&&holidayInfo.triplePay&&(schedule==='中班'||schedule==='白班'||schedule==='零点')){tags+=`<span class="triple-pay-tag">🧧×3</span>`;}tableHtml+=`<td class="${todayClass} ${selectedClass}" onclick="selectDate('${cell.dateStr}')">
                                    <div class="date-num">${cell.day}${isToday?'<span class="today-tag">今</span>':''} ${tags}</div>
                                    <div class="schedule-badge ${badgeClass}">${schedule}</div>
                                </td>`;}});tableHtml+='</tr>';});tbody.innerHTML=tableHtml;updateOtherValues(selectedDateStr);}window.selectDate=function(dateStr){selectedDateStr=dateStr;renderMonthCalendar();};window.goToToday=function(){const now=new Date();const y=now.getFullYear();const m=String(now.getMonth()+1).padStart(2,'0');const d=String(now.getDate()).padStart(2,'0');selectedDateStr=`${y}-${m}-${d}`;document.getElementById('monthPicker').value=`${y}-${m}`;renderMonthCalendar();};let _settingTempBase1ZeroDate='';function dateAddDays(dateStr,days){const d=new Date(dateStr);d.setDate(d.getDate()+days);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}function updateSettingPreview(){const row=document.getElementById('settingPreviewRow');if(!row)return;let cells='';for(let val=1;val<=5;val++){const middleShiftDate=dateAddDays(_settingTempBase1ZeroDate,(val-1)*2-6);cells+=`<td><span class="val-name">${val}值</span><br><span style="font-size:11px;color:#555;">${middleShiftDate}</span></td>`;}row.innerHTML=cells;}function syncSettingDateFromTemp(){const valSelect=document.getElementById('settingValueSelect');const shiftSelect=document.getElementById('settingShiftSelect');const dateInput=document.getElementById('settingDateInput');if(!valSelect||!shiftSelect||!dateInput)return;const v=parseInt(valSelect.value);const p=parseInt(shiftSelect.value);const targetDate=dateAddDays(_settingTempBase1ZeroDate,(v-1)*2+(p-7));dateInput.value=targetDate;}window.onSettingValueChange=function(){syncSettingDateFromTemp();updateSettingPreview();};window.onSettingShiftChange=function(){syncSettingDateFromTemp();updateSettingPreview();};window.onSettingDateChange=function(){const valSelect=document.getElementById('settingValueSelect');const shiftSelect=document.getElementById('settingShiftSelect');const dateInput=document.getElementById('settingDateInput');if(!valSelect||!shiftSelect||!dateInput)return;const v=parseInt(valSelect.value);const p=parseInt(shiftSelect.value);const D=dateInput.value;if(!D)return;_settingTempBase1ZeroDate=dateAddDays(D,-((v-1)*2+(p-7)));updateSettingPreview();};window.openSettingsModal=function(){_settingTempBase1ZeroDate=baseDateConfig[1].date;const valSelect=document.getElementById('settingValueSelect');const shiftSelect=document.getElementById('settingShiftSelect');const dateInput=document.getElementById('settingDateInput');const defaultValSelect=document.getElementById('defaultValueSelect');if(valSelect)valSelect.value='1';if(shiftSelect)shiftSelect.value='7';if(dateInput)dateInput.value=_settingTempBase1ZeroDate;if(defaultValSelect)defaultValSelect.value=localStorage.getItem(CONFIG.DEFAULT_VALUE_KEY)||'1';updateSettingPreview();document.getElementById('settingsModal').style.display='flex';};window.closeSettingsModal=function(){document.getElementById('settingsModal').style.display='none';};window.saveAllBaseDates=function(){const valSelect=document.getElementById('settingValueSelect');const shiftSelect=document.getElementById('settingShiftSelect');const dateInput=document.getElementById('settingDateInput');const defaultValSelect=document.getElementById('defaultValueSelect');if(!valSelect||!shiftSelect||!dateInput){closeSettingsModal();return;}const v=parseInt(valSelect.value);const p=parseInt(shiftSelect.value);const D=dateInput.value;if(!D){alert('请选择日期');return;}const newBase1Zero=dateAddDays(D,-((v-1)*2+(p-7)));baseDateConfig=generateFullConfigFromBase1Zero(newBase1Zero);saveFullConfigToStorage(baseDateConfig);const defaultVal=defaultValSelect?defaultValSelect.value:'1';localStorage.setItem(CONFIG.DEFAULT_VALUE_KEY,defaultVal);document.getElementById('scheduleValue').value=defaultVal;closeSettingsModal();renderMonthCalendar();};const calendarWrapper=document.querySelector('.calendar-wrapper');if(calendarWrapper){let startX,startY,swiping=false;calendarWrapper.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;swi
